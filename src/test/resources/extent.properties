# Mengaktifkan reporter HTML (Spark)
extent.reporter.spark.start=true
# Menambahkan timestamp agar folder tidak tertimpa
extent.reporter.spark.out=test-output/SparkReport/
base64.screenshot=true
extent.reporter.spark.viewOrder=dashboard,test,category,author,device

# Konfigurasi screenshot (Opsional tapi sangat disarankan)
screenshot.dir=test-output/Screenshots/
screenshot.rel.path=../Screenshots/