name: Hadir Automation Test

on:
  push:
    branches: [ "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Setup Chrome/Firefox
      # GitHub runner ubuntu-latest sudah include browser & driver terbaru
      run: |
        google-chrome --version
        firefox --version

    - name: Run Tests with Maven
      env:
        # Ambil dari GitHub Secrets
        HADIR_EMAIL: ${{ secrets.HADIR_EMAIL }}
        HADIR_PASSWORD: ${{ secrets.HADIR_PASSWORD }}
      run:  mvn test -Dtest=TestRunner

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-reports
        path: test-output/SparkReport/ # Sesuaikan path report kamu